<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --card:#181b21; --inner:#21252e; --line:rgba(255,255,255,.07);
    --line2:rgba(255,255,255,.06); --text:#eef3f8; --muted:#9aa6b4;
    --faint:#6b7682; --sky:#4aa3ff; --teal:#2dd4bf;
  }
  html,body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .stage{
    width:860px;height:760px;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(900px 600px at 72% -8%, #11506b 0%, rgba(17,80,107,0) 55%),
      linear-gradient(150deg,#0d3147 0%,#0b2440 45%,#091a30 100%);
  }
  .pop{position:relative;width:362px}
  .tail{position:absolute;top:-8px;left:50%;transform:translateX(-50%) rotate(45deg);
    width:16px;height:16px;background:var(--card);border-top:1px solid var(--line);border-left:1px solid var(--line);border-radius:3px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(45,212,191,.04), 0 10px 40px rgba(20,160,180,.12);
  }
  .head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px 11px}
  .head .l{display:flex;align-items:center;gap:10px}
  .head img{width:26px;height:26px;border-radius:7px}
  .title{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.01em}
  .refresh{color:var(--muted);display:flex}
  .seg{margin:0 14px 12px;background:#0e1015;border:1px solid var(--line2);border-radius:9px;padding:3px;display:flex}
  .seg div{flex:1;text-align:center;font-size:12.5px;font-weight:600;padding:5px 0;border-radius:6px;color:var(--muted)}
  .seg .on{background:#363b45;color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .body{padding:0 14px 6px;display:flex;flex-direction:column;gap:8px}
  .group{background:var(--inner);border:1px solid var(--line2);border-radius:12px;padding:2px 0 4px}
  .ghead{display:flex;align-items:center;gap:7px;padding:9px 12px 3px}
  .gname{font-size:13.5px;font-weight:600;color:var(--text)}
  .pill-kind{font-size:10.5px;color:var(--muted);background:rgba(255,255,255,.09);padding:1px 7px;border-radius:9px}
  .row{padding:6px 12px}
  .rtop{display:flex;align-items:center;gap:9px}
  .port{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;font-weight:700;color:var(--sky);width:58px;letter-spacing:-.02em}
  .name{font-size:13.5px;color:var(--muted);flex:1}
  .acts{display:flex;align-items:center;gap:9px;color:var(--faint)}
  .acts .kill{color:#e0626a}
  .div{height:1px;background:var(--line2);margin:5px 0 0 12px}
  .tunnel{margin-top:6px;margin-left:58px;display:inline-flex;align-items:center;gap:6px;
    background:rgba(72,199,116,.16);border:1px solid rgba(72,199,116,.25);color:#56cd84;
    padding:3px 9px;border-radius:11px;font-size:11px;width:max-content}
  .tunnel b{font-weight:700}.tunnel span{color:#8fdcab}
  .foot{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-top:1px solid var(--line2);margin-top:4px}
  .foot .c{font-size:12px;color:var(--faint)}
  .foot .q{font-size:13px;color:var(--muted)}
  svg{display:block}
</style>
</head>
<body>
<div class="stage">
  <div class="pop">
    <div class="tail"></div>
    <div class="card">
      <div class="head">
        <div class="l">
          <img src="../assets/icon-1024.png" alt="" />
          <span class="title">Porthole</span>
        </div>
        <span class="refresh"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></span>
      </div>

      <div class="seg"><div class="on">Ports</div><div>Ignored</div></div>

      <div class="body">
        <!-- roomify -->
        <div class="group">
          <div class="ghead"><span class="gname">roomify</span><span class="pill-kind">node</span></div>
          <div class="row">
            <div class="rtop">
              <span class="port">:3000</span><span class="name">vite</span>
              <span class="acts"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="13" height="13" x="9" y="9" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#e0626a"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg></span>
            </div>
            <div class="tunnel"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> <b>ngrok</b> <span>ab12.ngrok.io</span></div>
          </div>
          <div class="div"></div>
          <div class="row"><div class="rtop"><span class="port">:5555</span><span class="name">prisma</span><span class="acts"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="13" height="13" x="9" y="9" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#e0626a"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg></span></div></div>
        </div>
        <!-- rophim -->
        <div class="group">
          <div class="ghead"><span class="gname">rophim</span><span class="pill-kind">node</span></div>
          <div class="row"><div class="rtop"><span class="port">:5173</span><span class="name">next</span><span class="acts"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="13" height="13" x="9" y="9" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#e0626a"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg></span></div></div>
        </div>
        <!-- other -->
        <div class="group">
          <div class="ghead"><span class="gname">Other</span></div>
          <div class="row"><div class="rtop"><span class="port">:6379</span><span class="name">redis-server</span><span class="acts"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="13" height="13" x="9" y="9" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#e0626a"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg></span></div></div>
        </div>
      </div>

      <div class="foot"><span class="c">4 ports · 1 tunnel</span><span class="q">Quit</span></div>
    </div>
  </div>
</div>
</body>
</html>
