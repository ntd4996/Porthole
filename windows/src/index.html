<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Porthole</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="hdr">
      <span class="title">Porthole</span>
      <button id="refresh" class="icon" title="Refresh ports" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
    </header>

    <div class="tabs">
      <button class="tab on" data-tab="ports" id="tab-ports">Ports</button>
      <button class="tab" data-tab="ignored" id="tab-ignored">Ignored</button>
    </div>

    <div class="scroll">
      <div id="panel-ports" class="panel"></div>
      <div id="panel-ignored" class="panel" hidden></div>
    </div>

    <footer class="ftr">
      <span id="count" class="count"></span>
      <button id="check-updates" class="link"></button>
      <button id="quit" class="link"></button>
    </footer>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="app.js"></script>
</body>
</html>
