<svg xmlns="http://www.w3.org/2000/svg" width="660" height="420" viewBox="0 0 660 420" font-family="-apple-system,'SF Pro Text',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="660" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f3a52"/>
      <stop offset="0.55" stop-color="#0c2440"/>
      <stop offset="1" stop-color="#091a30"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#11506b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#11506b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="250" y1="0" x2="410" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="660" height="420" fill="url(#bg)"/>
  <rect width="660" height="420" fill="url(#glow)"/>

  <text x="330" y="70" text-anchor="middle" fill="#eaf3fb" font-size="22" font-weight="700" letter-spacing="-0.3">Install Porthole</text>
  <text x="330" y="98" text-anchor="middle" fill="#9fb4c9" font-size="13.5">Drag the app onto the Applications folder</text>

  <!-- arrow from app -> Applications, centered between icon slots at y=215 -->
  <g stroke="url(#arrow)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="250" y1="200" x2="402" y2="200"/>
    <path d="M386 184 L408 200 L386 216"/>
  </g>
</svg>
