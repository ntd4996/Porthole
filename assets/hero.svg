<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bd" x1="0" y1="0" x2="900" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f3a52"/>
      <stop offset="0.5" stop-color="#0c2a45"/>
      <stop offset="1" stop-color="#0a1c33"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26282d"/>
      <stop offset="1" stop-color="#1c1e22"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="900" height="640" fill="url(#bd)"/>

  <!-- panel -->
  <g filter="url(#sh)">
    <rect x="262" y="70" width="376" height="500" rx="18" fill="url(#panel)" stroke="#3a3d44" stroke-width="1"/>
  </g>

  <!-- header -->
  <text x="286" y="108" fill="#ffffff" font-size="19" font-weight="700">Porthole</text>
  <g transform="translate(596,92)" stroke="#9aa0a8" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M2 9 A8 8 0 1 1 4 14"/>
    <path d="M2 3 L2 9 L8 9"/>
  </g>

  <!-- segmented -->
  <rect x="286" y="124" width="328" height="30" rx="8" fill="#121316"/>
  <rect x="288" y="126" width="162" height="26" rx="6" fill="#3a3d44"/>
  <text x="369" y="143" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Ports</text>
  <text x="532" y="143" fill="#9aa0a8" font-size="13" text-anchor="middle">Ignored</text>

  <!-- card: roomify -->
  <rect x="286" y="170" width="328" height="118" rx="11" fill="#2c2f34" stroke="#3c4047" stroke-width="1"/>
  <text x="300" y="194" fill="#ffffff" font-size="14" font-weight="600">roomify</text>
  <rect x="362" y="182" width="42" height="17" rx="8.5" fill="#41454d"/>
  <text x="383" y="194" fill="#c2c7cf" font-size="10.5" text-anchor="middle">node</text>
  <!-- row 3000 -->
  <text x="300" y="223" fill="#4aa3ff" font-size="14" font-weight="700" font-family="ui-monospace, Menlo, monospace">:3000</text>
  <text x="372" y="223" fill="#9aa0a8" font-size="13.5">vite</text>
  <g fill="#9aa0a8"><circle cx="556" cy="218" r="1.6"/></g>
  <text x="540" y="223" fill="#9aa0a8" font-size="13">↗  ⧉</text>
  <!-- ngrok pill -->
  <rect x="346" y="232" width="180" height="20" rx="10" fill="#1c3a24"/>
  <circle cx="358" cy="242" r="4" fill="none" stroke="#48c774" stroke-width="1.3"/>
  <line x1="354" y1="242" x2="362" y2="242" stroke="#48c774" stroke-width="1.3"/>
  <line x1="358" y1="238" x2="358" y2="246" stroke="#48c774" stroke-width="1.3"/>
  <text x="370" y="246" fill="#48c774" font-size="11" font-weight="600">ngrok</text>
  <text x="404" y="246" fill="#7fd9a0" font-size="11">ab12.ngrok.io</text>
  <line x1="300" y1="262" x2="600" y2="262" stroke="#3a3d44" stroke-width="1"/>
  <!-- row 5555 -->
  <text x="300" y="281" fill="#4aa3ff" font-size="14" font-weight="700" font-family="ui-monospace, Menlo, monospace">:5555</text>
  <text x="372" y="281" fill="#9aa0a8" font-size="13.5">prisma</text>
  <text x="540" y="281" fill="#9aa0a8" font-size="13">↗  ⧉</text>

  <!-- card: rophim -->
  <rect x="286" y="300" width="328" height="74" rx="11" fill="#2c2f34" stroke="#3c4047" stroke-width="1"/>
  <text x="300" y="324" fill="#ffffff" font-size="14" font-weight="600">rophim</text>
  <rect x="358" y="312" width="42" height="17" rx="8.5" fill="#41454d"/>
  <text x="379" y="324" fill="#c2c7cf" font-size="10.5" text-anchor="middle">node</text>
  <text x="300" y="354" fill="#4aa3ff" font-size="14" font-weight="700" font-family="ui-monospace, Menlo, monospace">:5173</text>
  <text x="372" y="354" fill="#9aa0a8" font-size="13.5">vite</text>
  <text x="540" y="354" fill="#9aa0a8" font-size="13">↗  ⧉</text>

  <!-- card: Other -->
  <rect x="286" y="386" width="328" height="74" rx="11" fill="#2c2f34" stroke="#3c4047" stroke-width="1"/>
  <text x="300" y="410" fill="#ffffff" font-size="14" font-weight="600">Other</text>
  <text x="300" y="440" fill="#4aa3ff" font-size="14" font-weight="700" font-family="ui-monospace, Menlo, monospace">:6379</text>
  <text x="372" y="440" fill="#9aa0a8" font-size="13.5">redis-server</text>
  <text x="540" y="440" fill="#9aa0a8" font-size="13">↗  ⧉</text>

  <!-- footer -->
  <line x1="262" y1="528" x2="638" y2="528" stroke="#3a3d44" stroke-width="1"/>
  <text x="286" y="552" fill="#7b818a" font-size="12">4 ports · 1 tunnel</text>
  <text x="614" y="552" fill="#9aa0a8" font-size="13" text-anchor="end">Quit</text>
</svg>
